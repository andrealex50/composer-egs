services:
  # ═══════════════════════════════════════════════════════════════
  # TRAEFIK / EDGE PROXY (único serviço publicado no host)
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --log.level=INFO
    ports:
      - "80:80"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - edge-net
      - services-net
      - observability-net
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # HASHICORP VAULT — Secrets Management
  # ═══════════════════════════════════════════════════════════════
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    expose:
      - "8200"
    networks:
      - services-net
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    entrypoint: /bin/sh
    command: ["/vault-init/init.sh"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-internal-dev-key-2024}
      PAYMENT_ADMIN_API_KEY: ${PAYMENT_ADMIN_API_KEY:-admin-dev-key-2024}
      PAYMENT_API_KEY: ${PAYMENT_API_KEY:-admin-dev-key-2024}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    volumes:
      - ./vault/init.sh:/vault-init/init.sh:ro
    depends_on:
      vault:
        condition: service_started
    networks:
      - services-net
    restart: "no"

  # ═══════════════════════════════════════════════════════════════
  # COMPOSER / API GATEWAY
  # ═══════════════════════════════════════════════════════════════
  composer:
    build: .
    container_name: composer
    expose:
      - "8000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      PAYMENT_PUBLIC_URL: ${PAYMENT_PUBLIC_URL:-http://payment.flashsale}
      COMPOSER_CORS_ORIGINS: ${COMPOSER_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500,http://composer.flashsale,http://auth.flashsale,http://inventory.flashsale,http://payment.flashsale}
      COMPOSER_BROWSER_RETURN_TO_ORIGINS: ${COMPOSER_BROWSER_RETURN_TO_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://composer.flashsale}
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      INVENTORY_API_KEY: sk_test_inventory_dev_key
      # Recomendada: tenant key criada no Payment (/api/v1/admin/api-keys)
      PAYMENT_API_KEY: ${PAYMENT_API_KEY:-admin-dev-key-2024}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-internal-dev-key-2024}
      EVENT_MUTATIONS_REQUIRE_ADMIN: ${EVENT_MUTATIONS_REQUIRE_ADMIN:-true}
      EVENT_ADMIN_ROLES: ${EVENT_ADMIN_ROLES:-admin,promoter}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: composer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL_MS: 5000
    depends_on:
      auth-service:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
    networks:
      - services-net
      - observability-net
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # AUTH SERVICE + Postgres + Redis
  # ═══════════════════════════════════════════════════════════════
  auth-service:
    build: ../EGS/auth-service
    container_name: auth-service
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://user:password@auth-postgres:5432/auth_db
      REDIS_URL: redis://auth-redis:6379/0
      SECRET_KEY: super-secret-jwt-key-for-dev-2024
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-internal-dev-key-2024}
      BACKEND_CORS_ORIGINS: ${AUTH_BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500,http://composer.flashsale,http://auth.flashsale,http://payment.flashsale}
      SERVICE_PUBLIC_BASE_URL: ${AUTH_FRONTEND_PUBLIC_BASE_URL:-http://auth.flashsale}
      PASSWORD_RESET_LINK_PATH: ${AUTH_PASSWORD_RESET_LINK_PATH:-/templates/reset_password.html}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-egs_refresh_token}
      AUTH_REFRESH_COOKIE_PATH: ${AUTH_REFRESH_COOKIE_PATH:-/}
      AUTH_REFRESH_COOKIE_SAMESITE: ${AUTH_REFRESH_COOKIE_SAMESITE:-lax}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-false}
      AUTH_REFRESH_COOKIE_HTTPONLY: ${AUTH_REFRESH_COOKIE_HTTPONLY:-true}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEBUG: "False"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: auth-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL_MS: 5000
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    networks:
      - services-net
      - auth-db-net
      - observability-net
    restart: unless-stopped

  auth-frontend:
    image: nginx:1.27-alpine
    container_name: auth-frontend
    expose:
      - "80"
    volumes:
      - ../EGS/frontend:/usr/share/nginx/html:ro
    networks:
      - services-net
    restart: unless-stopped

  auth-postgres:
    image: postgres:15-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-db-net

  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-db-net

  # ═══════════════════════════════════════════════════════════════
  # INVENTORY SERVICE + Postgres + Redis
  # ═══════════════════════════════════════════════════════════════
  inventory-service:
    build: ../inventory-service-egs
    container_name: inventory-service
    expose:
      - "8000"
    environment:
      APP_NAME: Inventory Service
      APP_VERSION: 1.0.0
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://inventory_user:inventory_pass@inv-postgres:5432/inventory_db_fresh
      REDIS_URL: redis://inv-redis:6379/0
      API_KEY: sk_test_inventory_dev_key
      RATE_LIMIT_PER_MINUTE: 120
      RESERVATION_TTL_MINUTES: 15
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL_MS: 5000
    depends_on:
      inv-postgres:
        condition: service_healthy
      inv-redis:
        condition: service_healthy
    networks:
      - services-net
      - inventory-db-net
      - observability-net
    restart: unless-stopped

  inv-postgres:
    image: postgres:16-alpine
    container_name: inv-postgres
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db_fresh
    volumes:
      - inv_pg_data_fresh:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db_fresh"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory-db-net

  inv-redis:
    image: redis:7-alpine
    container_name: inv-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory-db-net

  # ═══════════════════════════════════════════════════════════════
  # PAYMENT SERVICE + Postgres + Redis
  # ═══════════════════════════════════════════════════════════════
  payment-service:
    build: ../Payment_service
    container_name: payment-service
    expose:
      - "8000"
    environment:
      APP_NAME: Payment Service
      APP_VERSION: 1.0.0
      DEBUG: "true"
      ENVIRONMENT: development
      # Chave bootstrap de admin para gerir tenant keys
      ADMIN_API_KEY: ${PAYMENT_ADMIN_API_KEY:-admin-dev-key-2024}
      DATABASE_URL: postgresql+asyncpg://payment_user:payment_pass@pay-postgres:5432/payment_db
      REDIS_URL: redis://pay-redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8000
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-internal-dev-key-2024}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60
      LOG_LEVEL: INFO
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      # OpenTelemetry — export to unified collector
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: payment-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRIC_EXPORT_INTERVAL_MS: 5000
    depends_on:
      pay-postgres:
        condition: service_healthy
      pay-redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - services-net
      - payment-db-net
      - observability-net
    restart: unless-stopped

  pay-postgres:
    image: postgres:16-alpine
    container_name: pay-postgres
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
    volumes:
      - pay_pg_data_fresh:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      payment-db-net:
        aliases:
          - postgres

  pay-redis:
    image: redis:7-alpine
    container_name: pay-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment-db-net

  # ═══════════════════════════════════════════════════════════════
  # OBSERVABILITY STACK (unified for all services)
  # ═══════════════════════════════════════════════════════════════

  # ── OpenTelemetry Collector ─────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    expose:
      - "4317"
      - "4318"
      - "8889"
    restart: unless-stopped
    networks:
      - observability-net

  # ── Jaeger (Distributed Tracing UI) ─────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    expose:
      - "16686"
      - "4317"
    restart: unless-stopped
    networks:
      - observability-net

  # ── Prometheus (Metrics Storage) ────────────
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      - otel-collector
    restart: unless-stopped
    networks:
      - observability-net

  # ── Grafana (Dashboards & Visualization) ────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - observability-net

volumes:
  auth_pg_data:
  inv_pg_data_fresh:
  pay_pg_data_fresh:
  prometheus_data:
  grafana_data:

# ═══════════════════════════════════════════════════════════════
# NETWORKS — fully internal service nets + isolated per-service DB nets
# ═══════════════════════════════════════════════════════════════
networks:
  # Public edge network used only by Traefik for host port binding.
  edge-net:

  # Internal east-west service network. Only Traefik publishes a host port.
  services-net:
    internal: true

  # Per-service database networks — fully internal, no internet access
  auth-db-net:
    internal: true

  inventory-db-net:
    internal: true

  payment-db-net:
    internal: true

  # Observability network — internal, connects all services to monitoring
  observability-net:
    internal: true
